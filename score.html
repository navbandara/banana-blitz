<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Score - Banana Blitz</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg">
  <div class="page">
    <button class="backBtn" onclick="location.href='menufile.html'">←</button>

    <header class="topBrand small">
      <h1 class="title">BANANA <span>BLITZ</span></h1>
      <p class="subtitle">Your Score</p>
    </header>

    <main class="card centerCard">
      <h2 class="h2">Final Score</h2>
      <div class="bigScore" id="finalScore">0</div>

      <div class="rowBtns">
        <button class="btn btn-dark" onclick="location.href='menufile.html'">Back to Menu</button>
        <button class="btn btn-green" onclick="location.href='levels.html'">Play Again</button>
      </div>

      <p class="smallText">Your score is saved to the leaderboard.</p>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
