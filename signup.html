<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Banana Blitz</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg">
  <div class="page">
    <button class="backBtn" onclick="location.href='index.html'">←</button>

    <header class="topBrand small">
      <img class="logo smallLogo" src="assets/img/logo.png" alt="Logo">
      <h1 class="title">BANANA <span>BLITZ</span></h1>
      <p class="subtitle">Create a free account</p>
    </header>

    <main class="card formCard">
      <label class="label">Username</label>
      <input class="input" id="username" type="text" placeholder="Your name" />

      <label class="label">Email</label>
      <input class="input" id="email" type="email" placeholder="your@email.com" />

      <label class="label">Password</label>
      <input class="input" id="password" type="password" placeholder="••••••••" />

      <button class="btn btn-orange full" id="signupBtn">Sign Up</button>

      <p class="smallText">
        Already have an account? <a href="login.html">Login</a>
      </p>

      <p class="msg" id="message"></p>
    </main>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
