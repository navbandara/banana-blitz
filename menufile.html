<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu - Banana Blitz</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg">
  <div class="page">
    <button class="backBtn" id="backBtn">←</button>

    <header class="topBar">
      <div class="userBox">
        <span id="userName">Player</span>
        <button class="btn btn-dark smallBtn" id="logoutBtn">Logout</button>
      </div>
    </header>

    <header class="topBrand small">
      <h1 class="title">BANANA <span>BLITZ</span></h1>
      <p class="subtitle">Main Menu</p>
    </header>

    <main class="card centerCard">
      <button class="btn btn-orange full" onclick="location.href='levels.html'">Play</button>
      <button class="btn btn-blue full" onclick="location.href='howtoplay.html'">Instructions</button>
      <button class="btn btn-green full" onclick="location.href='leaderboard.html'">Leaderboard</button>
      <button class="btn btn-yellow full" onclick="location.href='score.html'">My Score</button>
    </main>

    <div class="bottomDecor">
      <img src="assets/img/monkey.png" class="decorMonkey" alt="">
      <img src="assets/img/banana.png" class="decorBanana" alt="">
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
