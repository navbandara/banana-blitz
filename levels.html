<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Levels - Banana Blitz</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg">
  <div class="page">
    <button class="backBtn" onclick="location.href='menufile.html'">←</button>

    <header class="topBrand small">
      <h1 class="title">BANANA <span>BLITZ</span></h1>
      <p class="subtitle">Select your difficulty</p>
    </header>

    <main class="levelsGrid">
      <div class="levelCard green">
        <h3>Easy</h3>
        <p>Time: <b>60s</b></p>
        <button class="btn btn-green full" data-level="easy">Start</button>
      </div>

      <div class="levelCard orange">
        <h3>Moderate</h3>
        <p>Time: <b>40s</b></p>
        <button class="btn btn-orange full" data-level="moderate">Start</button>
      </div>

      <div class="levelCard red">
        <h3>Hard</h3>
        <p>Time: <b>20s</b></p>
        <button class="btn btn-red full" data-level="hard">Start</button>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
